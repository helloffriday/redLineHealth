<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory — Redline Health</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="inventory">

  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <span class="eyebrow">Supplies &amp; Equipment</span>
          <h1>Inventory</h1>
        </div>
        <div class="topbar-right">
          <div class="id-chip" id="topbar-id-chip"></div>
        </div>
      </header>

      <div class="content">
        <div class="page-head">
          <p>Track medical supplies, medication stock, and equipment across departments.</p>
        </div>

        <section class="grid grid-3">
          <div class="card stat-card">
            <div class="top">
              <div class="stat-icon red">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
              </div>
            </div>
            <div class="value" id="stat-low-stock">&ndash;</div>
            <div class="label">Items below reorder point</div>
          </div>
          <div class="card stat-card">
            <div class="top">
              <div class="stat-icon green">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6L9 17l-5-5"/></svg>
              </div>
            </div>
            <div class="value" id="stat-in-stock">&ndash;</div>
            <div class="label">Items in stock</div>
          </div>
          <div class="card stat-card">
            <div class="top">
              <div class="stat-icon amber">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
              </div>
            </div>
            <div class="value" id="stat-expiring">&ndash;</div>
            <div class="label">Batches expiring this month</div>
          </div>
        </section>

        <div class="card panel" style="margin-top:18px;">
          <div class="panel-head">
            <div>
              <span class="eyebrow">Stock Room</span>
              <h3>All items</h3>
            </div>
            <div class="toolbar">
              <div class="search-input">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
                <input type="text" id="inventory-search" placeholder="Search item or SKU" />
              </div>
              <select class="select-input" id="inventory-filter">
                <option value="all">All categories</option>
                <option value="medication">Medication</option>
                <option value="supplies">Supplies</option>
                <option value="equipment">Equipment</option>
              </select>
              <button class="btn btn-primary btn-sm" id="toggle-new-item" type="button">+ Add item</button>
            </div>
          </div>

          <!-- Collapsible add/edit item form (shared for both flows) -->
          <div class="collapse-panel" id="item-panel">
            <form id="item-form" style="padding: 4px 0 22px;">
              <h4 id="item-panel-title" style="margin: 0 0 12px;">Add item</h4>
              <div class="settings-grid">
                <div class="field">
                  <label for="it-name">Item name *</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg>
                    <input type="text" id="it-name" placeholder="Amoxicillin 500mg" required />
                  </div>
                </div>
                <div class="field">
                  <label for="it-detail">Detail line</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
                    <input type="text" id="it-detail" placeholder="Pharmacy &middot; Box of 100" />
                  </div>
                </div>
                <div class="field">
                  <label for="it-category">Category *</label>
                  <select class="select-input" id="it-category" style="width:100%;" required>
                    <option value="">Select</option>
                    <option value="medication">Medication</option>
                    <option value="supplies">Supplies</option>
                    <option value="equipment">Equipment</option>
                  </select>
                </div>
                <div class="field">
                  <label for="it-sku">SKU</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
                    <input type="text" id="it-sku" placeholder="MED-1042" />
                  </div>
                </div>
                <div class="field">
                  <label for="it-quantity">Quantity</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
                    <input type="number" id="it-quantity" min="0" step="1" placeholder="18" />
                  </div>
                </div>
                <div class="field">
                  <label for="it-unit">Unit label</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8l-9-5-9 5 9 5 9-5z"/></svg>
                    <input type="text" id="it-unit" placeholder="boxes" />
                  </div>
                </div>
                <div class="field">
                  <label for="it-reorder">Reorder point</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
                    <input type="number" id="it-reorder" min="0" step="1" placeholder="10" />
                  </div>
                </div>
                <div class="field">
                  <label for="it-expires">Batch expiry</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
                    <input type="date" id="it-expires" />
                  </div>
                </div>
                <div class="field">
                  <label for="it-notes">Notes</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
                    <input type="text" id="it-notes" placeholder="Optional" />
                  </div>
                </div>
              </div>

              <div id="item-msg" class="form-msg"></div>

              <div class="login-submit" style="display:flex; gap:10px; margin-top:18px;">
                <button type="submit" class="btn btn-primary" id="item-submit">
                  <span class="spinner" id="item-spinner"></span>
                  <span id="item-submit-label">Save item</span>
                </button>
                <button type="button" class="btn btn-ghost" id="item-cancel">Cancel</button>
              </div>
            </form>
          </div>

          <div class="table-wrap">
            <table id="inventory-table">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Category</th>
                  <th>SKU</th>
                  <th>Quantity</th>
                  <th>Status</th>
                  <th>Last updated</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="inventory-tbody">
                <tr><td colspan="7"><div class="empty-state"><span class="mono" style="color:var(--ink-soft);">Loading inventory&hellip;</span></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/inventory.js"></script>
</body>
</html>
