<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patient Record — Redline Health</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="patients">

  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <span class="eyebrow">Records</span>
          <h1>Patient record</h1>
        </div>
        <div class="topbar-right">
          <div class="id-chip" id="topbar-id-chip"></div>
        </div>
      </header>

      <div class="content" id="detail-content" style="display:none;">
        <a href="patients.html" class="back-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to patients
        </a>

        <div class="card panel">
          <div class="record-hero" style="margin-bottom:8px;">
            <div class="avatar-lg" id="pd-avatar">--</div>
            <div class="r-meta">
              <div class="r-name" id="pd-name">&nbsp;</div>
              <div class="r-sub">
                <span class="mono" id="pd-code">&nbsp;</span>
                <span>&middot;</span>
                <span id="pd-age-sex">&nbsp;</span>
              </div>
            </div>
            <div class="record-actions">
              <button class="btn btn-ghost btn-sm" id="pd-edit-btn" type="button">Edit</button>
              <button class="btn-icon" id="pd-delete-btn" type="button" title="Delete patient">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg>
              </button>
            </div>
          </div>

          <hr class="divider" />

          <form id="pd-form">
            <div class="settings-grid">
              <div class="field">
                <label>Full name</label>
                <div class="input-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
                  <input type="text" id="pd-full-name" disabled />
                </div>
              </div>
              <div class="field">
                <label>Date of birth</label>
                <div class="input-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
                  <input type="date" id="pd-dob" disabled />
                </div>
              </div>
              <div class="field">
                <label>Sex</label>
                <select class="select-input" id="pd-sex" style="width:100%;" disabled>
                  <option value="">Select</option>
                  <option value="female">Female</option>
                  <option value="male">Male</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="field">
                <label>Contact number</label>
                <div class="input-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1 19.5 19.5 0 01-6-6A19.8 19.8 0 012.1 4.2 2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.7a2 2 0 01-.5 2.1L8 9.7a16 16 0 006 6l1.2-1.2a2 2 0 012.1-.5c.9.3 1.8.5 2.7.6a2 2 0 011.7 2z"/></svg>
                  <input type="text" id="pd-contact" disabled />
                </div>
              </div>
              <div class="field">
                <label>Email</label>
                <div class="input-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
                  <input type="email" id="pd-email" disabled />
                </div>
              </div>
              <div class="field">
                <label>Guardian name (if minor)</label>
                <div class="input-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20.5s-7.5-4.6-10-9.3C.4 7.7 2.3 4 6 4c2.1 0 3.6 1.1 6 3.4C14.4 5.1 15.9 4 18 4c3.7 0 5.6 3.7 4 7.2-2.5 4.7-10 9.3-10 9.3z"/></svg>
                  <input type="text" id="pd-guardian" disabled />
                </div>
              </div>
              <div class="field">
                <label>Blood type</label>
                <select class="select-input" id="pd-blood" style="width:100%;" disabled>
                  <option value="">Unknown</option>
                  <option>O+</option><option>O-</option>
                  <option>A+</option><option>A-</option>
                  <option>B+</option><option>B-</option>
                  <option>AB+</option><option>AB-</option>
                </select>
              </div>
              <div class="field">
                <label>Address</label>
                <div class="input-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  <input type="text" id="pd-address" disabled />
                </div>
              </div>
            </div>

            <div class="field" style="max-width: 100%;">
              <label>Allergies</label>
              <div class="input-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
                <input type="text" id="pd-allergies" placeholder="None recorded" disabled />
              </div>
            </div>

            <div class="field" style="max-width: 100%;">
              <label>Clinical notes</label>
              <textarea id="pd-notes" disabled rows="4" style="width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius: var(--radius-sm); background: var(--bg); color: var(--ink); resize: vertical;"></textarea>
            </div>

            <div id="pd-msg" class="form-msg"></div>

            <div class="login-submit" id="pd-save-row" style="display:none; gap:10px;">
              <button type="submit" class="btn btn-primary" id="pd-save-btn">
                <span class="spinner" id="pd-spinner"></span>
                <span id="pd-save-label">Save changes</span>
              </button>
              <button type="button" class="btn btn-ghost" id="pd-cancel-btn">Cancel</button>
            </div>
          </form>

          <hr class="divider" />
          <p style="font-size:12px; color:var(--ink-soft);">
            Registered <span class="mono" id="pd-created"></span>
          </p>
        </div>
      </div>

      <div class="content" id="detail-empty" style="display:none;">
        <div class="card">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
            <h4>Patient not found</h4>
            <p>This record may have been removed, or the link is invalid.</p>
            <a href="patients.html" class="btn btn-ghost btn-sm" style="margin-top:14px;">Back to patients</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/patient-detail.js"></script>
</body>
</html>
