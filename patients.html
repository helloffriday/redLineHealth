<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patients — Redline Health</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="patients">

  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <span class="eyebrow">Records</span>
          <h1>Patients</h1>
        </div>
        <div class="topbar-right">
          <div class="id-chip" id="topbar-id-chip"></div>
        </div>
      </header>

      <div class="content">
        <div class="page-head">
          <p>Search, view, and register patient records.</p>
        </div>

        <div class="card panel">
          <div class="panel-head">
            <div>
              <span class="eyebrow">Directory</span>
              <h3 id="patient-count">All patients</h3>
            </div>
            <div class="toolbar">
              <div class="search-input">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
                <input type="text" id="patient-search" placeholder="Search name or patient ID" />
              </div>
              <button class="btn btn-primary btn-sm" id="toggle-new-patient" type="button">+ New patient</button>
            </div>
          </div>

          <!-- Collapsible new-patient form -->
          <div class="collapse-panel" id="new-patient-panel">
            <form id="new-patient-form" style="padding: 4px 0 22px;">
              <div class="settings-grid">
                <div class="field">
                  <label for="np-full-name">Full name *</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
                    <input type="text" id="np-full-name" placeholder="Jane Dela Cruz" required />
                  </div>
                </div>
                <div class="field">
                  <label for="np-dob">Date of birth</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
                    <input type="date" id="np-dob" />
                  </div>
                </div>
                <div class="field">
                  <label for="np-sex">Sex</label>
                  <select class="select-input" id="np-sex" style="width:100%;">
                    <option value="">Select</option>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div class="field">
                  <label for="np-contact">Contact number</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1 19.5 19.5 0 01-6-6A19.8 19.8 0 012.1 4.2 2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.7a2 2 0 01-.5 2.1L8 9.7a16 16 0 006 6l1.2-1.2a2 2 0 012.1-.5c.9.3 1.8.5 2.7.6a2 2 0 011.7 2z"/></svg>
                    <input type="text" id="np-contact" placeholder="09xx xxx xxxx" />
                  </div>
                </div>
                <div class="field">
                  <label for="np-email">Email</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
                    <input type="email" id="np-email" placeholder="patient@example.com" />
                  </div>
                </div>
                <div class="field">
                  <label for="np-guardian">Guardian name (if minor)</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20.5s-7.5-4.6-10-9.3C.4 7.7 2.3 4 6 4c2.1 0 3.6 1.1 6 3.4C14.4 5.1 15.9 4 18 4c3.7 0 5.6 3.7 4 7.2-2.5 4.7-10 9.3-10 9.3z"/></svg>
                    <input type="text" id="np-guardian" placeholder="Optional" />
                  </div>
                </div>
                <div class="field">
                  <label for="np-blood">Blood type</label>
                  <select class="select-input" id="np-blood" style="width:100%;">
                    <option value="">Unknown</option>
                    <option>O+</option><option>O-</option>
                    <option>A+</option><option>A-</option>
                    <option>B+</option><option>B-</option>
                    <option>AB+</option><option>AB-</option>
                  </select>
                </div>
                <div class="field">
                  <label for="np-address">Address</label>
                  <div class="input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    <input type="text" id="np-address" placeholder="Street, city" />
                  </div>
                </div>
              </div>

              <div id="new-patient-msg" class="form-msg"></div>

              <div class="login-submit" style="display:flex; gap:10px; margin-top:18px;">
                <button type="submit" class="btn btn-primary" id="np-submit">
                  <span class="spinner" id="np-spinner"></span>
                  <span id="np-submit-label">Save patient</span>
                </button>
                <button type="button" class="btn btn-ghost" id="np-cancel">Cancel</button>
              </div>
            </form>
          </div>

          <div class="table-wrap">
            <table id="patients-table">
              <thead>
                <tr>
                  <th>Patient</th>
                  <th>Patient ID</th>
                  <th>Age / DOB</th>
                  <th>Sex</th>
                  <th>Contact</th>
                  <th>Registered</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="patients-tbody">
                <tr><td colspan="7"><div class="empty-state"><span class="mono" style="color:var(--ink-soft);">Loading patients&hellip;</span></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/patients.js"></script>
</body>
</html>
